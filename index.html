<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flow Eid Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      padding:20px;
      background:#03111f;
      font-family:"Noto Kufi Arabic", sans-serif;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }

    .controls{
      width:min(700px, 100%);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .controls input{
      flex:1;
      min-width:220px;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.07);
      color:#fff;
      outline:none;
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:16px;
    }

    .controls button{
      padding:14px 18px;
      border:none;
      border-radius:14px;
      background:#169fe6;
      color:#fff;
      cursor:pointer;
      font-family:"Noto Kufi Arabic", sans-serif;
      font-size:16px;
      font-weight:700;
    }

    .card{
      width:min(700px, 100%);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      position:relative;
    }

    #exportArea{
      position:relative;
      width:100%;
      aspect-ratio:1 / 1;
      overflow:hidden;
      background:#1f6f9f;
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* الاسم فوق اللوجو */
    #nameText{
      position:absolute;
      left:50%;
      bottom:13%;
      transform:translateX(-50%);
      width:60%;
      text-align:center;
      color:#ffffff;
      font-weight:700;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;

      /* Responsive size للموبايل والكمبيوتر */
      font-size:clamp(16px, 3vw, 34px);

      text-shadow:0 4px 15px rgba(0,0,0,.25);
    }

    .hint{
      width:min(700px, 100%);
      font-size:13px;
      color:rgba(255,255,255,.75);
      line-height:1.8;
    }

    @media (max-width: 600px){
      body{
        padding:14px;
      }

      .controls{
        flex-direction:column;
      }

      .controls button,
      .controls input{
        width:100%;
      }

      #nameText{
        width:78%;
        bottom:12.5%;
        font-size:clamp(15px, 4.2vw, 24px);
      }
    }
  </style>
</head>
<body>

  <div class="controls">
    <input id="nameInput" type="text" value="  " placeholder="اكتب الاسم هنا">
    <button id="downloadBtn">تحميل الصورة</button>
  </div>


  <div class="card">
    <div id="exportArea">
      <img src="Card 4.png" alt="Eid Card" class="bg">
      <div id="nameText"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const nameInput = document.getElementById("nameInput");
    const nameText = document.getElementById("nameText");
    const downloadBtn = document.getElementById("downloadBtn");
    const exportArea = document.getElementById("exportArea");

    function fitName(){
      const text = nameInput.value.trim() || " ";
      nameText.textContent = text;

      const len = text.length;

      if (window.innerWidth <= 600){
        if (len > 22) {
          nameText.style.fontSize = "14px";
        } else if (len > 16) {
          nameText.style.fontSize = "16px";
        } else {
          nameText.style.fontSize = "clamp(15px, 4.2vw, 24px)";
        }
      } else {
        if (len > 24) {
          nameText.style.fontSize = "20px";
        } else if (len > 18) {
          nameText.style.fontSize = "24px";
        } else {
          nameText.style.fontSize = "clamp(16px, 3vw, 34px)";
        }
      }
    }

    nameInput.addEventListener("input", fitName);
    window.addEventListener("resize", fitName);
    fitName();

    async function downloadCard(){
      try{
        await document.fonts.ready;

        const canvas = await html2canvas(exportArea, {
          scale: 2,
          useCORS: true,
          backgroundColor: null
        });

        const link = document.createElement("a");
        const fileName = (nameInput.value.trim() || "flow-card").replace(/\s+/g, "_");
        link.download = fileName + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }catch(e){
        alert("لو التحميل لم يعمل، افتح الملف من localhost أو استضافة بدل file://");
      }
    }

    downloadBtn.addEventListener("click", downloadCard);
  </script>

</body>
</html>
